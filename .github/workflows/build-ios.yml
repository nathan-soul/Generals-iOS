name: 🍎 Build Generals Zero Hour — iOS

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      skip_assets:
        description: 'Skip 2.7GB game assets (dev mode)'
        type: boolean
        default: true

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VULKAN_SDK: ${{ github.workspace }}/VulkanSDK/macOS

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg
            build/ios-vulkan/_deps
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('CMakePresets.json') }}

      - name: Setup vcpkg
        run: |
          if [[ "${{ steps.cache-vcpkg.outputs.cache-hit }}" == "true" ]]; then
            echo "Cache hit — ensuring vcpkg has full history for versioning"
            git -C "$VCPKG_ROOT" fetch --unshallow 2>/dev/null || echo "Already full or fetch skipped"
          else
            git clone https://github.com/microsoft/vcpkg $VCPKG_ROOT
            $VCPKG_ROOT/bootstrap-vcpkg.sh -disableMetrics
          fi

      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: VulkanSDK
          key: ${{ runner.os }}-vulkan-sdk

      - name: Download Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        run: |
          curl -sL https://sdk.lunarg.com/sdk/download/1.4.309.0/mac/vulkansdk-macos-1.4.309.0.zip \
            -o /tmp/vulkan.zip
          mkdir -p VulkanSDK
          unzip -q /tmp/vulkan.zip -d VulkanSDK/
          ls VulkanSDK/

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install system deps
        run: |
          brew install cmake ninja meson pkgconf xcodegen glslang

      - name: Fetch MoltenVK
        run: |
          ./scripts/build/ios/fetch-moltenvk.sh
          # Link iOS MoltenVK static lib to where CMake preset expects it
          MVK_STATIC="$HOME/GeneralsX/MoltenVK/MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64/libMoltenVK.a"
          if [[ -f "$MVK_STATIC" ]]; then
            mkdir -p "$VULKAN_SDK/lib/MoltenVK.xcframework/ios-arm64"
            cp "$MVK_STATIC" "$VULKAN_SDK/lib/MoltenVK.xcframework/ios-arm64/libMoltenVK.a"
            echo "Linked MoltenVK iOS static lib to VULKAN_SDK"
          else
            echo "ERROR: MoltenVK iOS static lib not found at $MVK_STATIC"
            ls -la "$HOME/GeneralsX/MoltenVK/MoltenVK/MoltenVK/" || true
            exit 1
          fi

      - name: Stage fonts
        run: ./scripts/build/ios/stage-fonts.sh

      - name: Configure CMake (iOS)
        run: cmake --preset ios-vulkan -DCMAKE_OSX_DEPLOYMENT_TARGET=17.0

      - name: Build engine
        run: cmake --build build/ios-vulkan --target z_generals

      - name: Package .ipa (unsigned — collect dylibs + frameworks)
        run: |
          BUILD_DIR="build/ios-vulkan"
          APP_DIR="${BUILD_DIR}/GeneralsMD/GeneralsXZH.app"
          OUT_IPA="${BUILD_DIR}/GeneralsZH-iOS.ipa"

          if [[ ! -f "${APP_DIR}/GeneralsXZH" ]]; then
            echo "ERROR: Binary not found at ${APP_DIR}/GeneralsXZH"
            exit 1
          fi
          echo "Binary: $(ls -la "${APP_DIR}/GeneralsXZH" | awk '{print $5}')"

          # Create Frameworks directory
          mkdir -p "${APP_DIR}/Frameworks"

          # Embed runtime dylibs
          DXVK_BUILD="${BUILD_DIR}/_deps/dxvk-build-macos"
          for lib in \
            "${DXVK_BUILD}/src/d3d8/libdxvk_d3d8.0.dylib" \
            "${DXVK_BUILD}/src/d3d9/libdxvk_d3d9.0.dylib" \
            "${BUILD_DIR}/_deps/sdl3-build/libSDL3.0.dylib" \
            "${BUILD_DIR}/_deps/sdl3_image-build/libSDL3_image.0.dylib" \
            "${BUILD_DIR}/_deps/openal_soft-build/libopenal.1.24.2.dylib" \
            "${BUILD_DIR}/libgamespy.dylib"; do
            if [[ -f "${lib}" ]]; then
              cp "${lib}" "${APP_DIR}/Frameworks/"
              echo "  embedded $(basename "${lib}")"
            else
              bn="$(basename "${lib}")"
              echo "  (not built: ${bn})"
            fi
          done

          # Rename openal-soft to expected name
          if [[ -f "${APP_DIR}/Frameworks/libopenal.1.24.2.dylib" ]]; then
            mv "${APP_DIR}/Frameworks/libopenal.1.24.2.dylib" "${APP_DIR}/Frameworks/libopenal.1.dylib"
            echo "  renamed openal to libopenal.1.dylib"
          fi

          # Embed MoltenVK.framework (DXVK dlopens it at runtime)
          MVK_FRAMEWORK="${HOME}/GeneralsX/MoltenVK/MoltenVK/MoltenVK/dynamic/MoltenVK.xcframework/ios-arm64/MoltenVK.framework"
          if [[ -d "${MVK_FRAMEWORK}" ]]; then
            cp -R "${MVK_FRAMEWORK}" "${APP_DIR}/Frameworks/"
            echo "  embedded MoltenVK.framework"
          else
            echo "ERROR: MoltenVK.framework not found at ${MVK_FRAMEWORK}"
            echo "  Run scripts/build/ios/fetch-moltenvk.sh first"
            exit 1
          fi

          # Add rpath so dyld can find Frameworks/
          install_name_tool -add_rpath "@executable_path/Frameworks" "${APP_DIR}/GeneralsXZH" 2>/dev/null || true

          # Bundle game assets (unless skip_assets=true)
          if [[ "${{ github.event.inputs.skip_assets }}" != "true" ]]; then
            GAME_DATA_SRC="${GX_GAME_DATA:-${HOME}/GeneralsX/GeneralsZH}"
            if [[ -d "${GAME_DATA_SRC}" ]]; then
              echo "==> Bundling game assets from ${GAME_DATA_SRC}"
              mkdir -p "${APP_DIR}/GameData"
              rsync -a --exclude=".*" \
                --exclude="*.dylib" --exclude="run.sh" --exclude="GeneralsXZH" \
                --exclude="GeneralsXZH.dxvk-cache" --exclude="*_d3d9.log" \
                --exclude="MoltenVK_icd.json" --exclude="dxvk.conf" --exclude="fontconfig" \
                --exclude="*.DLL" --exclude="*.dll" --exclude="*.dat" --exclude="*.ico" \
                --exclude="*.bmp" --exclude="*.doc" --exclude="*.lcf" --exclude="Launcher.txt" \
                --exclude="MSS" --exclude="Manuals" --exclude="steamapps" \
                --exclude="steam_appid.txt" --exclude="00000000.*" \
                --exclude="RedistInstallers" --exclude="_CommonRedist" --exclude="*.txt" \
                "${GAME_DATA_SRC}/" "${APP_DIR}/GameData/"
              echo "    bundled $(du -sh "${APP_DIR}/GameData" | cut -f1) of game data"
            else
              echo "WARNING: No game assets found at ${GAME_DATA_SRC}, skipping"
            fi
          else
            echo "  skip_assets=true — game assets not bundled"
          fi

          # Create .ipa (zip Payload/)
          echo "==> Creating .ipa"
          cd "${BUILD_DIR}"
          rm -f GeneralsZH-iOS.ipa
          mkdir -p Payload
          cp -R "${APP_DIR}" "Payload/"
          zip -q -r --symlinks GeneralsZH-iOS.ipa Payload/
          rm -rf Payload
          echo "    .ipa created: $(ls -lh GeneralsZH-iOS.ipa | awk '{print $5}')"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeneralsZH-iOS-${{ github.sha }}
          path: build/ios-vulkan/GeneralsZH-iOS.ipa
          compression-level: 0
          if-no-files-found: error
